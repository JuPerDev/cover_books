name: Deploy CoverBooks to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Google Books
        env:
          GOOGLE_BOOKS_API_KEY_SECRET: ${{ secrets.GOOGLE_BOOKS_API_KEY }}
          GOOGLE_BOOKS_API_KEY_VARIABLE: ${{ vars.GOOGLE_BOOKS_API_KEY }}
        run: |
          node -e "const fs = require('fs'); const key = process.env.GOOGLE_BOOKS_API_KEY_SECRET || process.env.GOOGLE_BOOKS_API_KEY_VARIABLE || ''; if (!key) { throw new Error('GOOGLE_BOOKS_API_KEY is not available to this workflow. Add it as an environment secret on github-pages or as a repository secret/variable.'); } fs.writeFileSync('coverbooks.config.js', 'window.COVERBOOKS_CONFIG = ' + JSON.stringify({ googleBooksApiKey: key }) + ';\\n');"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
